offline_pipeline:
  project_root: ../../..
  pipeline_name: single_source_sequential_c6_inference_phase_50s
  source_backend: single_source_sequential_replay
  output_root: outputs/offline_runs/single_source_sequential_c6_inference_phase_50s
  frame_source_mode: video_files
  low_load:
    enabled: true
    start_frame: 0
    end_frame: 3000
    frame_stride: 6
  execution:
    mode: sequential
    packet_batch_size: 256
    queue_max_size: 64
    start_method: spawn
  dataset:
    root: Wildtrack
    video_sources:
      C1: Wildtrack/cam6.mp4
      C2: Wildtrack/cam6.mp4
      C3: Wildtrack/cam6.mp4
      C4: Wildtrack/cam6.mp4
  single_source_replay:
    source_camera_id: C6
    source_template_config: wildtrack_demo/wildtrack_demo_config.json
    source_video: Wildtrack/cam6.mp4
    replay_count: 4
    virtual_camera_ids: [C1, C2, C3, C4]
    virtual_time_offsets_sec: [0, 6, 12, 18]
    virtual_frame_offsets: [0, 60, 120, 180]
    track_provider: inference_yolo_bytetrack
    inference:
      detector_model: yolov8n.pt
      tracker: bytetrack.yaml
      device: cpu
      conf_threshold: 0.25
      iou_threshold: 0.5
      imgsz: 640
      person_class_id: 0
      target_timeline_fps: 10
      verbose: false
      tracklet_linking:
        enabled: true
        max_gap_frames: 12
        min_iou: 0.15
        max_normalized_center_distance: 0.65
        min_motion_continuity: 0.25
  wildtrack_demo_config: wildtrack_demo/single_source_sequential_c6_demo_config.json
  face_demo_config: insightface_demo_assets/runtime/face_demo_config.json
  face_demo_overrides:
    demo_auto_enroll_count: 0
  known_gallery:
    manifest_csv: insightface_demo_assets/known_face_manifest.csv
    gallery_root: insightface_demo_assets/known_faces
  association_policy_config: insightface_demo_assets/runtime/config/association_policy.wildtrack_phase_f_tuned.yaml
  camera_transition_map_config: insightface_demo_assets/runtime/config/camera_transition_map.single_source_sequential_c6.yaml
  scene_calibration_config: insightface_demo_assets/runtime/config/manual_scene_calibration.single_source_sequential_c6.json
