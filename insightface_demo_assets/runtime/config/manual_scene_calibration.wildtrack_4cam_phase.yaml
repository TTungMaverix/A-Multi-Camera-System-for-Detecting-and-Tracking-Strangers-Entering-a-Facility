scene_calibration:
  version: 1
  coordinate_space: normalized
  processing:
    require_manual_calibration: true
    roi_mask_enabled: true
    mask_outside_polygon: true
    preview_overlay_enabled: true
    preview_interval_sec: 1.0
    min_bbox_coverage: 0.35
  direction_filter:
    history_window: 6
    minimum_points: 4
    minimum_inward_motion_px: 18
    minimum_inside_ratio: 0.55
    require_zone_transition: false
    allow_line_cross_only_when_history_short: false
    inward_zone_types: [exit, interior, overlap, transit]
    outward_zone_types: [entry, outer, approach]
  cameras:
    C3:
      camera_id: C3
      role: followup
      description: ROI-focused follow-up plaza view for the 4-camera benchmark.
      preview_source: Wildtrack/cam3.mp4
      preview_source_type: file
      frame_size_ref: { width: 1920, height: 1080 }
      processing_roi:
        polygon:
          - [0.0770, 0.1957]
          - [0.3234, 0.1155]
          - [0.6399, 0.2143]
          - [0.6735, 0.2460]
          - [0.1012, 0.5031]
      entry_line: { points: [], in_side_point: [] }
      default_zone_id: c3_followup_main
      default_subzone_id: c3_overlap_entry
      entry_zones: [c3_followup_main]
      exit_zones: [c3_followup_main]
      zones:
        - zone_id: c3_followup_main
          zone_type: transit
          polygon:
            - [0.0770, 0.1957]
            - [0.3234, 0.1155]
            - [0.6399, 0.2143]
            - [0.6735, 0.2460]
            - [0.1012, 0.5031]
          priority: 100
          description: Main visible corridor for C3 after ROI tightening.
          placeholder: false
      subzones:
        - subzone_id: c3_overlap_entry
          parent_zone_id: c3_followup_main
          subzone_type: overlap
          polygon:
            - [0.1074, 0.4957]
            - [0.6672, 0.2460]
            - [0.6389, 0.2180]
            - [0.3244, 0.1202]
            - [0.0802, 0.1985]
          priority: 110
          description: Main overlap arrival region from entry-side cameras.
          placeholder: false
          allowed_transitions: []
    C5:
      camera_id: C5
      role: entry
      description: Entry-side ROI for the front-facing camera.
      preview_source: Wildtrack/cam5.mp4
      preview_source_type: file
      frame_size_ref: { width: 1920, height: 1080 }
      processing_roi:
        polygon:
          - [0.4282, 0.1789]
          - [0.9418, 0.1714]
          - [0.9953, 0.2441]
          - [0.9900, 0.8721]
          - [0.4638, 0.9504]
      entry_line:
        points:
          - [0.6787, 0.3820]
          - [0.9911, 0.5982]
        in_side_point: [0.9439, 0.4416]
      default_zone_id: c5_entry_main
      default_subzone_id: c5_inner_overlap
      entry_zones: [c5_entry_main]
      exit_zones: [c5_entry_main]
      zones:
        - zone_id: c5_entry_main
          zone_type: entry
          polygon:
