            - [0.9889, 0.6038]
            - [0.6724, 0.3690]
          priority: 100
          description: Approach region before the inward crossing.
          placeholder: false
          allowed_transitions: []
        - subzone_id: c5_inner_overlap
          parent_zone_id: c5_entry_main
          subzone_type: overlap
          polygon:
            - [0.4387, 0.1966]
            - [0.4785, 0.9271]
            - [0.9827, 0.8507]
            - [0.9911, 0.2469]
            - [0.9387, 0.1761]
          priority: 110
