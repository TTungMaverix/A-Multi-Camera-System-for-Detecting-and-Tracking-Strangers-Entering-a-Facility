offline_pipeline:
  project_root: ../../..
  pipeline_name: wildtrack_4cam_inference_no_roi_benchmark
  source_backend: wildtrack_video_inference
  output_root: outputs/offline_runs/wildtrack_4cam_inference_no_roi_benchmark
  frame_source_mode: video_files
  low_load:
    enabled: true
    start_frame: 0
    end_frame: 360
    frame_stride: 12
  execution:
    mode: sequential
    packet_batch_size: 256
    queue_max_size: 64
    start_method: spawn
  dataset:
    root: Wildtrack
    video_sources:
      C3: Wildtrack/cam3.mp4
      C5: Wildtrack/cam5.mp4
      C6: Wildtrack/cam6.mp4
      C7: Wildtrack/cam7.mp4
  multi_source_inference:
    detector_model: yolov8n.pt
    tracker: insightface_demo_assets/runtime/config/bytetrack.wildtrack_4cam_strict.yaml
    device: cpu
    conf_threshold: 0.45
    iou_threshold: 0.35
    imgsz: 640
    person_class_id: 0
    target_timeline_fps: 10
    verbose: false
    cache:
      enabled: true
      use_cache: true
      refresh_cache: false
      cache_dir: outputs/offline_runs/cache/wildtrack_4cam_detector_tracker
    tracklet_linking:
      enabled: true
      max_gap_frames: 12
      min_iou: 0.15
      max_normalized_center_distance: 0.65
      min_motion_continuity: 0.25
    roi_filter:
      enabled: false
      pre_mask_enabled: false
      post_filter_enabled: false
      require_footpoint_inside: false
      min_bbox_coverage: 0.0
  wildtrack_demo_config: wildtrack_demo/wildtrack_demo_config.json
  face_demo_config: insightface_demo_assets/runtime/face_demo_config.json
  face_demo_overrides:
    demo_auto_enroll_count: 0
  known_gallery:
    manifest_csv: insightface_demo_assets/known_face_manifest.csv
    gallery_root: insightface_demo_assets/known_faces
  association_policy_config: insightface_demo_assets/runtime/config/association_policy.wildtrack_phase_f_tuned.yaml
  camera_transition_map_config: insightface_demo_assets/runtime/config/camera_transition_map.wildtrack_4cam_phase.yaml
  scene_calibration_config: insightface_demo_assets/runtime/config/manual_scene_calibration.wildtrack_4cam_phase.yaml
